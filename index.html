<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Tanam Padi PRO</title>

<style>
:root {
  --primary: #81c784; 
  --bg-dark: #121212;
  --card-dark: #1e1e1e;
  --input-bg: #2d2d2d;
  --text-main: #e0e0e0;
  --text-muted: #b0b0b0;
  --orange: #ffb74d;
  --blue: #64b5f6;
}

body {
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background-color: var(--bg-dark);
  color: var(--text-main);
  display: flex;
  justify-content: center;
  padding: 20px;
  margin: 0;
}

/* TOMBOL HOME MELAYANG */
/* TOMBOL HOME MELAYANG DI KIRI ATAS */
.btn-home {
  position: fixed; /* Tetap di posisi meski layar di-scroll */
  top: 15px;      /* Jarak dari atas */
  left: 15px;     /* Jarak dari kiri */
  background: var(--primary);
  color: #121212;
  width: 45px;    /* Sedikit diperkecil agar lebih rapi di atas */
  height: 45px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  font-size: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  z-index: 10000; /* Pastikan selalu di depan */
  transition: all 0.3s ease;
  border: 2px solid white;
}

.btn-home:hover {
  transform: scale(1.1);
  background: white;
  color: var(--primary);
}

.container {
  background: var(--card-dark);
  max-width: 500px;
  width: 100%;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 { 
  text-align: center; 
  color: var(--primary); 
  margin-bottom: 25px;
  font-weight: 700;
}

label { 
  font-weight: 600; 
  font-size: 0.85rem; 
  color: var(--text-muted); 
  display: block; 
  margin-top: 15px;
  margin-left: 5px;
}

input, select, button { 
  width: 100%; 
  padding: 14px; 
  margin-top: 8px; 
  border-radius: 12px; 
  border: 1px solid #444; 
  background: var(--input-bg);
  color: white;
  box-sizing: border-box;
  font-size: 1rem;
}

input:focus, select:focus {
  outline: none;
  border-color: var(--primary);
}

button { 
  background: var(--primary); 
  color: #121212; 
  border: none; 
  font-weight: bold; 
  cursor: pointer; 
  margin-top: 25px; 
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
}

button:hover { 
  background: #a5d6a7; 
  transform: translateY(-2px);
}

.result { 
  margin-top: 30px; 
  display: none; 
  border-top: 1px solid #333; 
  padding-top: 20px;
}

.card { 
  background: #252525; 
  padding: 18px; 
  border-left: 4px solid var(--primary); 
  margin-bottom: 15px; 
  border-radius: 10px; 
  position: relative;
  transition: transform 0.2s;
}

.card:hover { transform: scale(1.02); }

.card b { color: var(--primary); display: block; margin-bottom: 6px; font-size: 0.95rem; }

.panen { border-left-color: var(--orange); background: #2d261e; }
.panen b { color: var(--orange); }

.info-pupuk { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; line-height: 1.4; }

.hst-badge { 
  position: absolute; 
  right: 12px; 
  top: 12px; 
  background: #333; 
  color: var(--primary); 
  padding: 3px 10px; 
  border-radius: 8px; 
  font-size: 0.75rem; 
  font-weight: bold;
  border: 1px solid var(--primary);
}
</style>
</head>

<body>

<a href="https://mamank757.github.io/petani" class="btn-home" title="Kembali ke Dashboard Utama">🏠</a>

<div class="container">
  <h2>🌾 KALKULATOR FASE PERTUMBUHAN PADI</h2>

  <label>📅 TANGGAL TANAM</label>
  <input type="date" id="tgl">

  <label>🌾 VARIETAS PADI</label>
  <select id="varietas">
    <option value="77">Ultra Genjah (70-84 HST)</option>
    <option value="88">Sangat Genjah (85-90 HST)</option>
    <option value="100" selected>Genjah (91-105 HST)</option>
    <option value="112">Sedang (106-115 HST)</option>
    <option value="120">Dalam (116-125 HST)</option>
  </select>

  <label>📐 LUAS LAHAN (HEKTAR)</label>
  <input type="number" id="luas" step="0.1" value="1">

  <button onclick="hitung()">🔍 ANALISIS SEKARANG</button>

  <div class="result" id="hasil"></div>
</div>

<script>
function tglFormat(t) {
  return new Date(t).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
}

function tambahHari(tanggal, hari) {
  let d = new Date(tanggal);
  d.setDate(d.getDate() + hari);
  return d;
}

function hitung() {
  const tglVal = document.getElementById("tgl").value;
  const umurVarietas = parseInt(document.getElementById("varietas").value);
  const luas = parseFloat(document.getElementById("luas").value) || 0;

  if (!tglVal) { alert("Pilih tanggal tanam!"); return; }

  const tanam = new Date(tglVal);
  const hariIni = new Date();
  // Set waktu ke 00:00:00 untuk perbandingan tanggal yang akurat
  hariIni.setHours(0, 0, 0, 0);
  tanam.setHours(0, 0, 0, 0);

  const selisihMilidetik = hariIni - tanam;
  const umurSekarang = Math.floor(selisihMilidetik / (1000 * 60 * 60 * 24));

  // Fungsi pembantu untuk menentukan gaya kartu berdasarkan HST
  const getStatusStyle = (targetHst, nextHst = null) => {
    if (umurSekarang > (nextHst || targetHst)) {
      return { label: "✅ SELESAI", style: "opacity: 0.6; border-left-color: #666;" };
    } else if (umurSekarang >= targetHst && (nextHst === null || umurSekarang < nextHst)) {
      return { label: "🚀 SEDANG BERLANGSUNG", style: "border-left-width: 8px; background: #2e3b2e; border-left-color: #ccff90;" };
    } else {
      return { label: "🕒 MENDATANG", style: "" };
    }
  };

  const p1_hst = 7;
  const p2_hst = 25;
  let p3_hst = umurVarietas - 55;
  if (p3_hst <= p2_hst) p3_hst = p2_hst + 15;

  const p1 = tambahHari(tanam, p1_hst);
  const p2 = tambahHari(tanam, p2_hst);
  const p3 = tambahHari(tanam, p3_hst);
  const panen = tambahHari(tanam, umurVarietas);
  const estimasi = (luas * 6).toFixed(1);

  // Logika Status Berdasarkan HST
  const s1 = getStatusStyle(p1_hst, p2_hst);
  const s2 = getStatusStyle(p2_hst, p3_hst);
  const s3 = getStatusStyle(p3_hst, umurVarietas);
  const sPanen = umurSekarang >= umurVarietas ? { label: "🌾 SIAP PANEN", style: "background: #4a3721;" } : { label: "⏳ MENUNGGU MATANG", style: "" };

  let statusTeks = "";
  if (umurSekarang < 0) {
    statusTeks = `Rencana Tanam (H${umurSekarang})`;
  } else if (umurSekarang > umurVarietas) {
    statusTeks = `Sudah Lewat Masa Panen (${umurSekarang} HST)`;
  } else {
    statusTeks = `${umurSekarang} Hari Setelah Tanam (HST)`;
  }

  document.getElementById("hasil").style.display = "block";
  document.getElementById("hasil").innerHTML = `
    <div class="card" style="border-left-color: var(--blue); background: #1a237e33;">
      <b>📊 STATUS REAL-TIME</b>
      <span style="font-size: 1.2rem; font-weight: bold;">${statusTeks}</span>
    </div>

    <div class="card" style="${s1.style}">
      <span class="hst-badge">${s1.label} | ${p1_hst} HST</span>
      <b>🧪 PUPUK TAHAP I (AWAL)</b>
      📅 ${tglFormat(p1)}
      <div class="info-pupuk">Gunakan campuran Urea & NPK dari total kebutuhan (cth Urea 175 kg/Ha x 40% = 50-75 kg/Ha, NPK 375 kg/Ha x 30% = 100 kg/Ha) untuk memacu pertumbuhan vegetatif awal.</div>
    </div>

    <div class="card" style="${s2.style}">
      <span class="hst-badge">${s2.label} | ${p2_hst} HST</span>
      <b>🧪 PUPUK TAHAP II (ANAKAN)</b>
      📅 ${tglFormat(p2)}
      <div class="info-pupuk">Fokus pada Urea (175 kg x 60% = 100 kg/Ha), NPK (375 kg x 30% = 100 kg/Ha) untuk memaksimalkan jumlah anakan produktif.</div>
    </div>

    <div class="card" style="${s3.style}">
      <span class="hst-badge">${s3.label} | ${p3_hst} HST</span>
      <b>🧪 PUPUK TAHAP III (BUNTING)</b>
      📅 ${tglFormat(p3)}
      <div class="info-pupuk">Fase Primordia. Tambahkan NPK (375 kg x 40% = 150-175 kg/Ha) untuk kualitas malai dan pengisian bulir.</div>
    </div>

    <div class="card panen" style="${sPanen.style}">
      <span class="hst-badge">${sPanen.label}</span>
      <b>🌾 PREDIKSI PANEN</b>
      📅 ${tglFormat(panen)}
      <div class="info-pupuk">Estimasi waktu masak fisiologis. Siapkan tenaga kerja dan peralatan.</div>
    </div>

    <div class="card panen" style="border-left-color: #4db6ac;">
      <b>💰 PROYEKSI HASIL GKP</b>
      ± ${estimasi} Ton Gabah
      <div class="info-pupuk">Berdasarkan luas lahan ${luas} ha dengan potensi rata-rata wilayah Bola.</div>
    </div>
  `;
}
</script>
<footer style="
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  text-align: center;
  padding: 10px;
  font-size: 0.8rem;
  color: var(--text-muted);
  background: #1e1e1e;
  border-top: 1px solid #333;
">
  <div class="footer">
  © 2026 Dibuat oleh:<br>
  <strong>King Mamank</strong> • PPL BPP Bola - Kab. Wajo - Sulsel
</div>
</footer>
</body>
</html>
